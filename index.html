<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Wristwatch AR Preview</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: rgba(18, 21, 25, 0.88);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4f6f8;
      --muted: #9ba5af;
      --accent: #d4af37;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      position: relative;
      width: 100%;
      height: 100%;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.12), transparent 24%),
        linear-gradient(145deg, #14181d 0%, #07090b 58%, #121416 100%);
      --poster-color: transparent;
    }

    .topbar {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.1;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(10, 12, 15, 0.48);
      color: var(--muted);
      font-size: 12px;
      backdrop-filter: blur(14px);
    }

    .preview-link {
      flex: 0 0 auto;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: rgba(10, 12, 15, 0.48);
      color: var(--text);
      font-size: 12px;
      text-decoration: none;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .status {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      top: calc(max(16px, env(safe-area-inset-top)) + 58px);
      z-index: 3;
      display: grid;
      gap: 6px;
      max-width: 520px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(10, 12, 15, 0.62);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(14px);
      pointer-events: none;
    }

    .status strong {
      color: var(--text);
      font-weight: 650;
    }

    .controls {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      pointer-events: none;
    }

    .control,
    .ar-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .control {
      min-height: 56px;
      padding: 9px 10px;
    }

    .control label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    input[type="range"],
    select {
      width: 100%;
      accent-color: var(--accent);
    }

    select {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(5, 6, 7, 0.64);
      color: var(--text);
      font: inherit;
      font-size: 12px;
    }

    .ar-button {
      height: 56px;
      color: #111;
      background: var(--accent);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .ar-button[slot="ar-button"] {
      position: absolute;
      right: max(16px, env(safe-area-inset-right));
      bottom: calc(max(16px, env(safe-area-inset-bottom)) + 70px);
      z-index: 4;
      width: 128px;
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
      }

      .brand h1 {
        font-size: 16px;
      }

      .badge {
        display: none;
      }

      .status {
        top: calc(max(16px, env(safe-area-inset-top)) + 54px);
        font-size: 11px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .ar-button[slot="ar-button"] {
        width: 112px;
        height: 48px;
        bottom: calc(max(16px, env(safe-area-inset-bottom)) + 196px);
      }
    }
  </style>
</head>
<body>
  <main>
    <model-viewer
      id="watchViewer"
      src="exports/wristwatch_ar_wrap_animation.glb"
      ios-src="exports/wristwatch_ar_wrap_animation.glb"
      alt="Luxury diver wristwatch AR model"
      camera-controls
      autoplay
      touch-action="pan-y"
      auto-rotate
      ar
      ar-modes="webxr scene-viewer quick-look"
      shadow-intensity="0.85"
      exposure="1.05"
      environment-image="neutral"
      camera-orbit="0deg 48deg 0.19m"
      field-of-view="28deg"
      min-camera-orbit="auto auto 0.08m"
      max-camera-orbit="auto auto 0.34m"
      scale="1 1 1">
      <button class="ar-button" slot="ar-button">AR表示</button>
    </model-viewer>

    <div class="topbar">
      <div class="brand">
        <h1>Wristwatch AR Preview</h1>
        <p>42 mm case / GLB / meter scale</p>
      </div>
      <a class="preview-link" href="camera-tracking-v2.html">Camera Preview</a>
    </div>

    <div class="status" id="arStatus">
      <strong>AR status:</strong>
      <span>Checking device support...</span>
    </div>

    <section class="controls" aria-label="Preview controls">
      <div class="control">
        <label for="watchSelect">Watch Type</label>
        <select id="watchSelect">
          <option value="diver">Diver Black</option>
          <option value="classic">Classic Blue</option>
        </select>
      </div>
      <div class="control">
        <label for="scaleControl">Scale</label>
        <input id="scaleControl" type="range" min="0.5" max="2" step="0.01" value="1">
      </div>
      <div class="control">
        <label for="exposureControl">Exposure</label>
        <input id="exposureControl" type="range" min="0.5" max="1.8" step="0.01" value="1.05">
      </div>
      <div class="control">
        <label for="rotationControl">Tilt</label>
        <input id="rotationControl" type="range" min="-70" max="70" step="1" value="0">
      </div>
    </section>
  </main>

  <script>
    const viewer = document.getElementById("watchViewer");
    const arStatus = document.getElementById("arStatus");
    const watchSelect = document.getElementById("watchSelect");
    const scaleControl = document.getElementById("scaleControl");
    const exposureControl = document.getElementById("exposureControl");
    const rotationControl = document.getElementById("rotationControl");

    const WATCH_MODELS = {
      diver: "exports/wristwatch_ar_wrap_animation.glb",
      classic: "exports/wristwatch_ar_classic_blue.glb",
    };

    function switchWatchModel() {
      const selected = watchSelect.value;
      const nextSrc = WATCH_MODELS[selected] || WATCH_MODELS.diver;
      if (!viewer.src.endsWith(nextSrc)) {
        viewer.src = nextSrc;
        viewer.iosSrc = nextSrc;
      }
    }

    function updateScale() {
      const value = Number(scaleControl.value);
      viewer.scale = `${value} ${value} ${value}`;
    }

    function updateExposure() {
      viewer.exposure = Number(exposureControl.value);
    }

    function updateTilt() {
      const degrees = Number(rotationControl.value);
      viewer.orientation = `${degrees}deg 0deg 0deg`;
    }

    watchSelect.addEventListener("change", switchWatchModel);
    switchWatchModel();

    scaleControl.addEventListener("input", updateScale);
    exposureControl.addEventListener("input", updateExposure);
    rotationControl.addEventListener("input", updateTilt);

    function setStatus(lines) {
      arStatus.innerHTML = "<strong>AR status:</strong>" + lines.map((line) => `<span>${line}</span>`).join("");
    }

    viewer.addEventListener("load", async () => {
      const canActivate = await viewer.canActivateAR;
      const secure = window.isSecureContext;
      const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (canActivate) {
        setStatus([
          "AR is available on this device. Tap AR表示.",
          "This preview opens native AR; the camera view may appear in a separate AR viewer.",
        ]);
        return;
      }

      if (!mobile) {
        setStatus([
          "3D preview is working, but desktop browsers usually cannot enter phone-style AR.",
          "Open this page on Android Chrome or iPhone Safari.",
        ]);
        return;
      }

      if (!secure) {
        setStatus([
          "3D preview is working, but browser AR/camera features may require HTTPS.",
          "Android Chrome may still use Scene Viewer; iPhone usually needs a USDZ file.",
        ]);
        return;
      }

      setStatus([
        "3D preview is working, but this browser did not report AR support.",
        "Try Android Chrome, iPhone Safari, or a device with ARCore/ARKit support.",
      ]);
    });

    viewer.addEventListener("ar-status", (event) => {
      setStatus([`AR session status: ${event.detail.status}`]);
    });
  </script>
</body>
</html>
