<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Wristwatch Wrist Tracking Preview v3</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(12, 14, 18, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f4f6f8;
      --muted: #a7b0ba;
      --accent: #d4af37;
      --ok: #69d391;
      --warn: #f1c44e;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050607;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    video,
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    video {
      z-index: 0;
      background: #050607;
      pointer-events: none;
    }

    canvas {
      z-index: 1;
      background: transparent;
      pointer-events: none;
    }

    #watchLayer {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 2;
      width: 250px;
      height: 250px;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      transform-origin: 50% 50%;
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }

    #watchLayer.visible {
      opacity: 1;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .topbar,
    .controls,
    .message {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      z-index: 3;
    }

    .topbar {
      top: max(16px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.1;
      font-weight: 650;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
    }

    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .message {
      top: calc(max(16px, env(safe-area-inset-top)) + 54px);
      max-width: 680px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .message strong { color: var(--text); }
    .message .ok { color: var(--ok); }
    .message .warn { color: var(--warn); }
    .start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-top: 8px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    .start-button:disabled {
      opacity: 0.55;
      cursor: default;
    }
    .lock-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }

    .lock-button.active {
      background: var(--accent);
      color: #111;
    }

    .controls {
      bottom: max(16px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .control {
      min-height: 56px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
    }

    .control label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    @media (max-width: 720px) {
      h1 { font-size: 15px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .message { font-size: 11px; }
      #watchLayer { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="watchLayer">
    <model-viewer
      id="watchViewer"
      src="exports/wristwatch_ar_wrap_animation.glb"
      alt="Luxury wristwatch model tracked to wrist"
      interaction-prompt="none"
      shadow-intensity="0.6"
      exposure="1.1"
      environment-image="neutral"
      camera-orbit="0deg 48deg 0.19m"
      field-of-view="28deg"
      scale="1 1 1">
    </model-viewer>
  </div>

  <div class="topbar">
    <h1>Wrist Tracking Preview v3</h1>
    <a class="link" href="index.html">AR page</a>
  </div>

  <div class="message" id="message">
    <strong>Status:</strong> Tap Start Camera to allow camera access.
    <br>
    <button class="start-button" id="startCameraButton" type="button" onclick="window.startExperience && window.startExperience(event)">Start Camera</button>
  </div>

  <section class="controls" aria-label="Tracking controls">
    <div class="control">
      <label for="watchSelect">AR Item</label>
      <select id="watchSelect">
        <option value="diver">Diver Black</option>
        <option value="classic">Classic Blue</option>
        <option value="bracelet">Metal Bracelet</option>
        <option value="ring">Gold Ring</option>
        <option value="nails">Rose Nails</option>
        <option value="glove">Black Glove</option>
      </select>
    </div>
    <div class="control">
      <label for="scaleControl">Model Scale</label>
      <input id="scaleControl" type="range" min="0.45" max="2.2" step="0.01" value="1.05">
    </div>
    <div class="control">
      <label for="offsetControl">Wrist Offset</label>
      <input id="offsetControl" type="range" min="-90" max="90" step="1" value="-26">
    </div>
    <div class="control">
      <label for="tiltControl">Dial Axis Rotate</label>
      <input id="tiltControl" type="range" min="-180" max="180" step="1" value="0">
    </div>
    <div class="control">
      <label for="bandRollControl">Rig Center Roll</label>
      <input id="bandRollControl" type="range" min="-75" max="75" step="1" value="0">
    </div>
    <div class="control">
      <label for="smoothControl">Smoothing</label>
      <input id="smoothControl" type="range" min="0.03" max="0.35" step="0.01" value="0.10">
    </div>
    <div class="control">
      <label for="deadZoneControl">Dead Zone</label>
      <input id="deadZoneControl" type="range" min="0" max="18" step="1" value="6">
    </div>
    <div class="control">
      <label for="lockWatchButton">Watch Lock</label>
      <button class="lock-button" id="lockWatchButton" type="button">Lock Watch</button>
    </div>
  </section>

  <script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const watchLayer = document.getElementById("watchLayer");
    const watchViewer = document.getElementById("watchViewer");
    const message = document.getElementById("message");
    const startCameraButton = document.getElementById("startCameraButton");
    const watchSelect = document.getElementById("watchSelect");
    const scaleControl = document.getElementById("scaleControl");
    const offsetControl = document.getElementById("offsetControl");
    const tiltControl = document.getElementById("tiltControl");
    const bandRollControl = document.getElementById("bandRollControl");
    const smoothControl = document.getElementById("smoothControl");
    const deadZoneControl = document.getElementById("deadZoneControl");
    const lockWatchButton = document.getElementById("lockWatchButton");


    const ITEM_CONFIGS = {
      diver: {
        src: "exports/wristwatch_ar_wrap_animation.glb",
        mode: "wrist",
        sizeFactor: 1.55,
        orbit: "0deg 48deg 0.19m",
        orientation: [0, 0, 0],
      },
      classic: {
        src: "exports/wristwatch_ar_classic_blue.glb",
        mode: "wrist",
        sizeFactor: 1.55,
        orbit: "0deg 48deg 0.19m",
        orientation: [0, 0, 0],
      },
      bracelet: {
        src: "exports/ar_bracelet_metal.glb",
        mode: "wrist",
        sizeFactor: 1.45,
        orbit: "0deg 52deg 0.13m",
        orientation: [0, 0, 0],
      },
      ring: {
        src: "exports/ar_ring_gold_gem.glb",
        mode: "ring",
        sizeFactor: 1.35,
        orbit: "0deg 50deg 0.055m",
        orientation: [0, 0, 0],
      },
      nails: {
        src: "exports/ar_nails_rose.glb",
        mode: "nails",
        sizeFactor: 1.55,
        orbit: "0deg 38deg 0.12m",
        orientation: [0, 0, 0],
      },
      glove: {
        src: "exports/ar_glove_black.glb",
        mode: "glove",
        sizeFactor: 1.55,
        orbit: "0deg 42deg 0.17m",
        orientation: [0, 0, 0],
      },
    };

    function getSelectedConfig() {
      return ITEM_CONFIGS[watchSelect.value] || ITEM_CONFIGS.diver;
    }

    function switchWatchModel() {
      const config = getSelectedConfig();
      if (!watchViewer.src.endsWith(config.src)) {
        watchViewer.src = config.src;
      }
      watchViewer.setAttribute("camera-orbit", config.orbit);
      smoothed = null;
      latestBaseTarget = null;
      lockedOffset = null;
      isWatchLocked = false;
      lockWatchButton.classList.remove("active");
      lockWatchButton.textContent = "Lock Watch";
    }

    let hands;
    let streamReady = false;
    let detectorReady = false;
    let isDetecting = false;
    let lastSeen = 0;
    let smoothed = null;
    let latestBaseTarget = null;
    let lockedOffset = null;
    let isWatchLocked = false;
    let experienceStarted = false;
    let loopStarted = false;

    function setMessage(html) {
      message.innerHTML = `<strong>Status:</strong> ${html}`;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(window.innerWidth * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getCoverRect() {
      const vw = video.videoWidth || 1280;
      const vh = video.videoHeight || 720;
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      const coverScale = Math.max(sw / vw, sh / vh);
      const width = vw * coverScale;
      const height = vh * coverScale;

      return {
        x: (sw - width) / 2,
        y: (sh - height) / 2,
        width,
        height,
      };
    }

    function mapVideoPoint(point) {
      const rect = getCoverRect();

      return {
        x: rect.x + point.x * rect.width,
        y: rect.y + point.y * rect.height,
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleLerp(a, b, t) {
      let diff = ((b - a + 540) % 360) - 180;
      return a + diff * t;
    }

    function getAngleDelta(a, b) {
      return Math.abs(((b - a + 540) % 360) - 180);
    }

    function cloneTransform(transform) {
      return transform ? { ...transform } : null;
    }

    function applyDeadZone(previous, target, pixels, degrees) {
      if (!previous) {
        return { ...target };
      }

      const next = { ...target };
      if (distance(previous, target) < pixels) {
        next.x = previous.x;
        next.y = previous.y;
      }
      if (Math.abs(previous.size - target.size) < pixels * 0.75) {
        next.size = previous.size;
      }
      if (getAngleDelta(previous.rotation, target.rotation) < degrees) {
        next.rotation = previous.rotation;
      }
      return next;
    }

    function toggleWatchLock() {
      if (!isWatchLocked && smoothed && latestBaseTarget) {
        lockedOffset = {
          x: smoothed.x - latestBaseTarget.x,
          y: smoothed.y - latestBaseTarget.y,
          size: smoothed.size / Math.max(1, latestBaseTarget.size),
          rotation: smoothed.rotation - latestBaseTarget.rotation,
        };
        isWatchLocked = true;
      } else {
        isWatchLocked = false;
        lockedOffset = null;
      }
      lockWatchButton.classList.toggle("active", isWatchLocked);
      lockWatchButton.textContent = isWatchLocked ? "Unlock Watch" : "Lock Watch";
    }

    function clearOverlay() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }

    function averagePoints(points) {
      return points.reduce((sum, point) => ({
        x: sum.x + point.x / points.length,
        y: sum.y + point.y / points.length,
      }), { x: 0, y: 0 });
    }

    function createTrackingTarget(points, config) {
      const wrist = points.wrist;
      const indexMcp = points.indexMcp;
      const pinkyMcp = points.pinkyMcp;
      const palmCenter = averagePoints([indexMcp, pinkyMcp, points.middleMcp]);
      const palmRotation = Math.atan2(indexMcp.y - pinkyMcp.y, indexMcp.x - pinkyMcp.x) * 180 / Math.PI;
      const offset = Number(offsetControl.value);

      if (config.mode === "ring") {
        const ringCenter = averagePoints([points.ringPip, points.ringDip]);
        const fingerRotation = Math.atan2(points.ringTip.y - points.ringMcp.y, points.ringTip.x - points.ringMcp.x) * 180 / Math.PI + 90;
        return {
          x: ringCenter.x,
          y: ringCenter.y,
          size: distance(points.ringMcp, points.ringTip) * config.sizeFactor,
          rotation: fingerRotation,
        };
      }

      if (config.mode === "nails") {
        const nailCenter = averagePoints([points.thumbTip, points.indexTip, points.middleTip, points.ringTip, points.pinkyTip]);
        return {
          x: nailCenter.x,
          y: nailCenter.y,
          size: distance(indexMcp, pinkyMcp) * config.sizeFactor,
          rotation: palmRotation,
        };
      }

      if (config.mode === "glove") {
        const handCenter = averagePoints([wrist, points.indexTip, points.middleTip, points.ringTip, points.pinkyTip]);
        return {
          x: handCenter.x,
          y: handCenter.y,
          size: distance(wrist, points.middleTip) * config.sizeFactor,
          rotation: Math.atan2(points.middleTip.y - wrist.y, points.middleTip.x - wrist.x) * 180 / Math.PI + 90,
        };
      }

      const armVector = {
        x: wrist.x - palmCenter.x,
        y: wrist.y - palmCenter.y,
      };
      const armLength = Math.max(1, Math.hypot(armVector.x, armVector.y));
      const normal = {
        x: armVector.x / armLength,
        y: armVector.y / armLength,
      };
      return {
        x: wrist.x + normal.x * offset,
        y: wrist.y + normal.y * offset,
        size: distance(indexMcp, pinkyMcp) * config.sizeFactor,
        rotation: palmRotation,
      };
    }

    function drawTracking(wrist, indexMcp, pinkyMcp, target) {
      clearOverlay();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(212, 175, 55, 0.9)";
      ctx.fillStyle = "rgba(105, 211, 145, 0.95)";
      ctx.beginPath();
      ctx.moveTo(indexMcp.x, indexMcp.y);
      ctx.lineTo(wrist.x, wrist.y);
      ctx.lineTo(pinkyMcp.x, pinkyMcp.y);
      ctx.stroke();

      for (const point of [wrist, indexMcp, pinkyMcp]) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.beginPath();
      ctx.arc(target.x, target.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function applyWatchTransform(target) {
      const smoothing = Number(smoothControl.value);
      const deadZonePixels = Number(deadZoneControl.value);
      const deadZoneDegrees = Math.max(1, deadZonePixels * 0.55);

      if (isWatchLocked && lockedOffset) {
        target = {
          x: target.x + lockedOffset.x,
          y: target.y + lockedOffset.y,
          size: target.size * lockedOffset.size,
          rotation: target.rotation + lockedOffset.rotation,
        };
      }

      const stabilizedTarget = applyDeadZone(smoothed, target, deadZonePixels, deadZoneDegrees);

      if (!smoothed) {
        smoothed = { ...stabilizedTarget };
      } else {
        smoothed.x = lerp(smoothed.x, stabilizedTarget.x, smoothing);
        smoothed.y = lerp(smoothed.y, stabilizedTarget.y, smoothing);
        smoothed.size = lerp(smoothed.size, stabilizedTarget.size, smoothing);
        smoothed.rotation = angleLerp(smoothed.rotation, stabilizedTarget.rotation, smoothing);
      }

      const scale = Math.max(0.35, smoothed.size / 220) * Number(scaleControl.value);
      const dialRotate = Number(tiltControl.value);
      const config = getSelectedConfig();
      const rigCenterRoll = Number(bandRollControl.value);
      const modelX = config.orientation[0];
      const modelY = config.orientation[1] + rigCenterRoll;
      const modelZ = config.orientation[2];
      const totalRotation = smoothed.rotation + dialRotate;
      watchLayer.classList.add("visible");
      watchLayer.style.transform = `translate(${smoothed.x - window.innerWidth / 2}px, ${smoothed.y - window.innerHeight / 2}px) translate(-50%, -50%) scale(${scale}) rotate(${totalRotation}deg)`;
      watchViewer.orientation = `${modelX}deg ${modelY}deg ${modelZ}deg`;

    }
    function onHandsResults(results) {
      clearOverlay();
      const landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];

      if (!landmarks) {
        if (performance.now() - lastSeen > 450) {
          if (!isWatchLocked) {
            watchLayer.classList.remove("visible");
          }
          setMessage(`<span class="warn">No hand detected.</span> Show your wrist and palm to the camera.`);
        }
        return;
      }

      const points = {
        wrist: mapVideoPoint(landmarks[0]),
        thumbTip: mapVideoPoint(landmarks[4]),
        indexMcp: mapVideoPoint(landmarks[5]),
        indexTip: mapVideoPoint(landmarks[8]),
        middleMcp: mapVideoPoint(landmarks[9]),
        middleTip: mapVideoPoint(landmarks[12]),
        ringMcp: mapVideoPoint(landmarks[13]),
        ringPip: mapVideoPoint(landmarks[14]),
        ringDip: mapVideoPoint(landmarks[15]),
        ringTip: mapVideoPoint(landmarks[16]),
        pinkyMcp: mapVideoPoint(landmarks[17]),
        pinkyTip: mapVideoPoint(landmarks[20]),
      };
      const config = getSelectedConfig();
      const baseTarget = createTrackingTarget(points, config);

      latestBaseTarget = { ...baseTarget };
      if (isWatchLocked && !lockedOffset && smoothed) {
        lockedOffset = {
          x: smoothed.x - baseTarget.x,
          y: smoothed.y - baseTarget.y,
          size: smoothed.size / Math.max(1, baseTarget.size),
          rotation: smoothed.rotation - baseTarget.rotation,
        };
      }
      const target = baseTarget;

      lastSeen = performance.now();
      drawTracking(points.wrist, points.indexMcp, points.pinkyMcp, target);
      applyWatchTransform(target);
      const lockText = isWatchLocked ? " Item position is locked to the hand." : "";
      setMessage(`<span class="ok">Hand detected.</span>${lockText} Adjust scale, offset, and roll if needed.`);
    }


    function requestCameraStream(constraints) {
      const request = navigator.mediaDevices.getUserMedia(constraints);
      const timeout = new Promise((_, reject) => {
        setTimeout(() => reject(new Error("Camera permission timed out")), 15000);
      });
      return Promise.race([request, timeout]);
    }
    async function startCamera() {
      if (!window.isSecureContext) {
        setMessage(`<span class="warn">HTTPS is required.</span> Open this page from GitHub Pages, not a local HTTP address.`);
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setMessage(`<span class="warn">Camera API is unavailable.</span> Use current Safari or Chrome on a camera-capable phone.`);
        return;
      }

      try {
        setMessage("Requesting camera permission. Please tap Allow if prompted.");
        const stream = await requestCameraStream({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        if (!video.videoWidth || !video.videoHeight) {
          await new Promise((resolve) => {
            video.onloadedmetadata = resolve;
            setTimeout(resolve, 800);
          });
        }
        streamReady = true;
        video.classList.add("camera-active");
        setMessage(`Camera is active (${video.videoWidth || "?"} x ${video.videoHeight || "?"}). Loading hand tracking...`);
      } catch (error) {
        setMessage(`<span class="warn">Camera could not start.</span> Detail: ${error.name}`);
      }
    }

    async function startHands() {
      if (!window.Hands) {
        setMessage(`<span class="warn">Hand tracking library did not load.</span> Check network access and reload.`);
        return;
      }

      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.55,
      });
      hands.onResults(onHandsResults);
      detectorReady = true;
      setMessage("Camera and hand tracking are ready. Show your wrist and palm to the camera.");
    }

    async function detectionLoop() {
      if (streamReady && detectorReady && !isDetecting && video.readyState >= 2) {
        isDetecting = true;
        try {
          await hands.send({ image: video });
        } catch (error) {
          setMessage(`<span class="warn">Tracking error.</span> ${error.name || error.message}`);
        } finally {
          isDetecting = false;
        }
      }
      requestAnimationFrame(detectionLoop);
    }


    async function startExperience(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      if (experienceStarted) {
        return;
      }

      experienceStarted = true;
      setMessage("Start button tapped. Requesting camera permission...");
      startCameraButton.disabled = true;
      startCameraButton.textContent = "Starting...";

      await startCamera();
      if (!streamReady) {
        experienceStarted = false;
        startCameraButton.disabled = false;
        startCameraButton.textContent = "Start Camera";
        return;
      }

      await startHands();
      if (!loopStarted) {
        loopStarted = true;
        detectionLoop();
      }
    }
    watchSelect.addEventListener("change", switchWatchModel);
    lockWatchButton.addEventListener("click", toggleWatchLock);
    switchWatchModel();

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    window.startExperience = startExperience;
    startCameraButton.addEventListener("click", startExperience);
    startCameraButton.addEventListener("pointerup", startExperience);
    startCameraButton.addEventListener("touchend", startExperience, { passive: false });
    video.addEventListener("playing", () => video.classList.add("camera-active"));
    video.addEventListener("pause", () => setMessage("Camera paused. Tap Start Camera again if the screen is black."));
    video.addEventListener("ended", () => setMessage("Camera ended. Tap Start Camera again."));
  </script>
</body>
</html>
