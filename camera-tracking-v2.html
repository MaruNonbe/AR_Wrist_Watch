<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Wristwatch Wrist Tracking Preview v2</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(12, 14, 18, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f4f6f8;
      --muted: #a7b0ba;
      --accent: #d4af37;
      --ok: #69d391;
      --warn: #f1c44e;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050607;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    video,
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #050607;
    }


    video {
      opacity: 0;
      pointer-events: none;
    }
    canvas {
      z-index: 1;
      pointer-events: none;
    }

    #watchLayer {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 2;
      width: 250px;
      height: 250px;
      transform: translate(-50%, -50%) scale(1) rotate(0deg);
      transform-origin: 50% 50%;
      opacity: 0;
      transition: opacity 160ms ease;
      pointer-events: none;
    }

    #watchLayer.visible {
      opacity: 1;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    .topbar,
    .controls,
    .message {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      z-index: 3;
    }

    .topbar {
      top: max(16px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.1;
      font-weight: 650;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.5);
    }

    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .message {
      top: calc(max(16px, env(safe-area-inset-top)) + 54px);
      max-width: 680px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(14px);
    }

    .message strong { color: var(--text); }
    .message .ok { color: var(--ok); }
    .message .warn { color: var(--warn); }

    .controls {
      bottom: max(16px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .control {
      min-height: 56px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(14px);
    }

    .control label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    @media (max-width: 720px) {
      h1 { font-size: 15px; }
      .controls { grid-template-columns: 1fr 1fr; }
      .message { font-size: 11px; }
      #watchLayer { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div id="watchLayer">
    <model-viewer
      id="watchViewer"
      src="exports/wristwatch_ar_wrap_animation.glb"
      alt="Luxury wristwatch model tracked to wrist"
      interaction-prompt="none"
      autoplay
      shadow-intensity="0.6"
      exposure="1.1"
      environment-image="neutral"
      camera-orbit="0deg 48deg 0.19m"
      field-of-view="28deg"
      scale="1 1 1">
    </model-viewer>
  </div>

  <div class="topbar">
    <h1>Wrist Tracking Preview v2</h1>
    <a class="link" href="index.html">AR page</a>
  </div>

  <div class="message" id="message">
    <strong>Status:</strong> Starting camera and hand tracking. Allow camera access if prompted.
  </div>

  <section class="controls" aria-label="Tracking controls">
    <div class="control">
      <label for="scaleControl">Model Scale</label>
      <input id="scaleControl" type="range" min="0.45" max="2.2" step="0.01" value="1.05">
    </div>
    <div class="control">
      <label for="offsetControl">Wrist Offset</label>
      <input id="offsetControl" type="range" min="-90" max="90" step="1" value="-26">
    </div>
    <div class="control">
      <label for="tiltControl">Dial Axis Rotate</label>
      <input id="tiltControl" type="range" min="-180" max="180" step="1" value="0">
    </div>
    <div class="control">
      <label for="smoothControl">Smoothing</label>
      <input id="smoothControl" type="range" min="0.05" max="0.45" step="0.01" value="0.18">
    </div>
  </section>

  <script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const watchLayer = document.getElementById("watchLayer");
    const watchViewer = document.getElementById("watchViewer");
    const message = document.getElementById("message");
    const scaleControl = document.getElementById("scaleControl");
    const offsetControl = document.getElementById("offsetControl");
    const tiltControl = document.getElementById("tiltControl");
    const smoothControl = document.getElementById("smoothControl");

    let hands;
    let streamReady = false;
    let detectorReady = false;
    let isDetecting = false;
    let lastSeen = 0;
    let smoothed = null;

    function setMessage(html) {
      message.innerHTML = `<strong>Status:</strong> ${html}`;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(window.innerWidth * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getCoverRect() {
      const vw = video.videoWidth || 1280;
      const vh = video.videoHeight || 720;
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      const coverScale = Math.max(sw / vw, sh / vh);
      const width = vw * coverScale;
      const height = vh * coverScale;

      return {
        x: (sw - width) / 2,
        y: (sh - height) / 2,
        width,
        height,
      };
    }

    function mapVideoPoint(point) {
      const rect = getCoverRect();

      return {
        x: rect.x + point.x * rect.width,
        y: rect.y + point.y * rect.height,
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleLerp(a, b, t) {
      let diff = ((b - a + 540) % 360) - 180;
      return a + diff * t;
    }

    function drawCameraFrame() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (!streamReady || !video.videoWidth || !video.videoHeight) {
        return;
      }

      const rect = getCoverRect();
      try {
        ctx.drawImage(video, rect.x, rect.y, rect.width, rect.height);
      } catch (error) {
        // Some browsers briefly reject drawImage while the stream is warming up.
      }
    }

    function clearOverlay() {
      drawCameraFrame();
    }

    function drawTracking(wrist, indexMcp, pinkyMcp, target) {
      clearOverlay();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "rgba(212, 175, 55, 0.9)";
      ctx.fillStyle = "rgba(105, 211, 145, 0.95)";
      ctx.beginPath();
      ctx.moveTo(indexMcp.x, indexMcp.y);
      ctx.lineTo(wrist.x, wrist.y);
      ctx.lineTo(pinkyMcp.x, pinkyMcp.y);
      ctx.stroke();

      for (const point of [wrist, indexMcp, pinkyMcp]) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
      ctx.beginPath();
      ctx.arc(target.x, target.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function applyWatchTransform(target) {
      const smoothing = Number(smoothControl.value);
      if (!smoothed) {
        smoothed = { ...target };
      } else {
        smoothed.x = lerp(smoothed.x, target.x, smoothing);
        smoothed.y = lerp(smoothed.y, target.y, smoothing);
        smoothed.size = lerp(smoothed.size, target.size, smoothing);
        smoothed.rotation = angleLerp(smoothed.rotation, target.rotation, smoothing);
      }

      const scale = Math.max(0.35, smoothed.size / 220) * Number(scaleControl.value);
      const dialRotate = Number(tiltControl.value);
      watchLayer.classList.add("visible");
      watchLayer.style.transform = `translate(${smoothed.x - window.innerWidth / 2}px, ${smoothed.y - window.innerHeight / 2}px) translate(-50%, -50%) scale(${scale}) rotate(${smoothed.rotation}deg)`;
      watchViewer.orientation = `0deg 0deg ${dialRotate}deg`;

    }
    function onHandsResults(results) {
      clearOverlay();
      const landmarks = results.multiHandLandmarks && results.multiHandLandmarks[0];

      if (!landmarks) {
        if (performance.now() - lastSeen > 450) {
          watchLayer.classList.remove("visible");
          setMessage(`<span class="warn">No hand detected.</span> Show your wrist and palm to the camera.`);
        }
        return;
      }

      const wrist = mapVideoPoint(landmarks[0]);
      const indexMcp = mapVideoPoint(landmarks[5]);
      const pinkyMcp = mapVideoPoint(landmarks[17]);
      const palmCenter = {
        x: (indexMcp.x + pinkyMcp.x) / 2,
        y: (indexMcp.y + pinkyMcp.y) / 2,
      };

      const armVector = {
        x: wrist.x - palmCenter.x,
        y: wrist.y - palmCenter.y,
      };
      const armLength = Math.max(1, Math.hypot(armVector.x, armVector.y));
      const normal = {
        x: armVector.x / armLength,
        y: armVector.y / armLength,
      };
      const offset = Number(offsetControl.value);
      const target = {
        x: wrist.x + normal.x * offset,
        y: wrist.y + normal.y * offset,
        size: distance(indexMcp, pinkyMcp) * 1.55,
        rotation: Math.atan2(indexMcp.y - pinkyMcp.y, indexMcp.x - pinkyMcp.x) * 180 / Math.PI,
      };

      lastSeen = performance.now();
      drawTracking(wrist, indexMcp, pinkyMcp, target);
      applyWatchTransform(target);
      setMessage(`<span class="ok">Hand detected.</span> Move your wrist slowly. Adjust scale and offset if the watch floats.`);
    }

    async function startCamera() {
      if (!window.isSecureContext) {
        setMessage(`<span class="warn">HTTPS is required.</span> Open this page from GitHub Pages, not a local HTTP address.`);
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setMessage(`<span class="warn">Camera API is unavailable.</span> Use current Safari or Chrome on a camera-capable phone.`);
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        if (!video.videoWidth || !video.videoHeight) {
          await new Promise((resolve) => {
            video.onloadedmetadata = resolve;
            setTimeout(resolve, 800);
          });
        }
        streamReady = true;
        drawCameraFrame();
        setMessage(`Camera is active (${video.videoWidth || "?"} x ${video.videoHeight || "?"}). Loading hand tracking...`);
      } catch (error) {
        setMessage(`<span class="warn">Camera could not start.</span> Detail: ${error.name}`);
      }
    }

    async function startHands() {
      if (!window.Hands) {
        setMessage(`<span class="warn">Hand tracking library did not load.</span> Check network access and reload.`);
        return;
      }

      hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.55,
      });
      hands.onResults(onHandsResults);
      detectorReady = true;
      setMessage("Camera and hand tracking are ready. Show your wrist and palm to the camera.");
    }

    async function detectionLoop() {
      if (streamReady && !isDetecting) {
        drawCameraFrame();
      }

      if (streamReady && detectorReady && !isDetecting && video.readyState >= 2) {
        isDetecting = true;
        try {
          await hands.send({ image: video });
        } catch (error) {
          setMessage(`<span class="warn">Tracking error.</span> ${error.name || error.message}`);
        } finally {
          isDetecting = false;
        }
      }
      requestAnimationFrame(detectionLoop);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    startCamera().then(startHands).then(detectionLoop);
  </script>
</body>
</html>
